name: Release gowind CLI

on:
  push:
    tags:
      - 'gowind/v*'

permissions:
  contents: write

env:
  CGO_ENABLED: 0

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
          - goos: windows
            goarch: arm64
            suffix: '.exe'
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gowind/go.mod
          cache-dependency-path: gowind/go.sum

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#gowind/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: gowind
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o "../build/gow-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}" \
            ./cmd/gow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gow-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/gow-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#gowind/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 gowind tag
          PREV_TAG=$(git tag --list 'gowind/v*' --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" -- gowind/ || true)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD -- gowind/ || true)
          fi
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/
          merge-multiple: true

      - name: Create checksums
        working-directory: build/
        run: |
          sha256sum * > ../checksums.txt
          mv ../checksums.txt checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "gowind ${{ steps.version.outputs.version }}"
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changes }}

            ## Downloads
            | File | OS | Arch |
            |------|----|------|
            | `gow-linux-amd64` | Linux | x86_64 |
            | `gow-linux-arm64` | Linux | ARM64 |
            | `gow-windows-amd64.exe` | Windows | x86_64 |
            | `gow-windows-arm64.exe` | Windows | ARM64 |
            | `gow-darwin-amd64` | macOS | x86_64 |
            | `gow-darwin-arm64` | macOS | ARM64 |
          files: |
            build/*
