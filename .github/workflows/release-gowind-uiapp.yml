name: Release gowind-uiapp

on:
  push:
    tags:
      - 'gowind-uiapp/v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: gowind-uiapp/go.mod
          cache-dependency-path: |
            gowind/go.sum
            gowind-uiapp/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gowind-uiapp/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: gowind-uiapp/frontend
        run: npm ci

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Extract version
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#gowind-uiapp/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Windows
        working-directory: gowind-uiapp
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: wails build -ldflags "-s -w" -o gowind-toolkit-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gowind-toolkit-windows-amd64
          path: gowind-uiapp/build/bin/gowind-toolkit-windows-amd64.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: gowind-uiapp/go.mod
          cache-dependency-path: |
            gowind/go.sum
            gowind-uiapp/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gowind-uiapp/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: gowind-uiapp/frontend
        run: npm ci

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux
        working-directory: gowind-uiapp
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: wails build -tags webkit2_41 -ldflags "-s -w" -o gowind-toolkit-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gowind-toolkit-linux-amd64
          path: gowind-uiapp/build/bin/gowind-toolkit-linux-amd64

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: gowind-uiapp/go.mod
          cache-dependency-path: |
            gowind/go.sum
            gowind-uiapp/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gowind-uiapp/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: gowind-uiapp/frontend
        run: npm ci

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS
        working-directory: gowind-uiapp
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: wails build -ldflags "-s -w" -o gowind-toolkit

      - name: Zip macOS build
        working-directory: gowind-uiapp/build/bin
        run: |
          ls -la
          if [ -d "gowind-toolkit.app" ]; then
            zip -r gowind-toolkit-darwin-arm64.zip gowind-toolkit.app
          else
            zip gowind-toolkit-darwin-arm64.zip gowind-toolkit
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gowind-toolkit-darwin-arm64
          path: gowind-uiapp/build/bin/gowind-toolkit-darwin-arm64.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#gowind-uiapp/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --list 'gowind-uiapp/v*' --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" -- gowind-uiapp/ || true)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD -- gowind-uiapp/ || true)
          fi
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/
          merge-multiple: true

      - name: Create checksums
        working-directory: build/
        run: |
          sha256sum * > ../checksums.txt
          mv ../checksums.txt checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "gowind-uiapp ${{ steps.version.outputs.version }}"
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changes }}

            ## Downloads
            | File | OS | Arch |
            |------|----|------|
            | `gowind-toolkit-windows-amd64.exe` | Windows | x86_64 |
            | `gowind-toolkit-linux-amd64` | Linux | x86_64 |
            | `gowind-toolkit-darwin-arm64.zip` | macOS | Apple Silicon |
          files: |
            build/*
