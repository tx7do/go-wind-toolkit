syntax = "proto3";

package tests;

import "google/protobuf/empty.proto";
import "redact/v1/redact.proto";

option go_package = "github.com/tx7do/go-wind-toolkit/protoc-gen-go-redact/examples/tests;tests";

option (redact.auto_detect) = {
  patterns: ["password", "secret"]
  default_action: { mask: { keep_first: 2 keep_last: 2 } }
};

enum TestEnum {
  ValueZero = 0;
  ValueOne = 1;
  ValueTwo = 2;
}

message TestMessage {
  float float_value = 2 [(redact.value).float = 3.2];

  double double_value = 4 [(redact.value).double = 6.4];

  int32 int32_value = 6 [(redact.value).int32 = 32];

  int64 int64_value = 8 [(redact.value).int64 = 64];

  uint32 uint32_value = 10 [(redact.value).uint32 = 32];

  uint64 uint64_value = 12 [(redact.value).uint64 = 64];

  sint32 sint32_value = 14 [(redact.value).sint32 = 32];

  sint64 sint64_value = 16 [(redact.value).sint64 = 64];

  fixed32 fixed32_value = 18 [(redact.value).fixed32 = 32];

  fixed64 fixed64_value = 20 [(redact.value).fixed64 = 64];

  sfixed32 sfixed32_value = 22 [(redact.value).sfixed32 = 32];

  sfixed64 sfixed64_value = 24 [(redact.value).sfixed64 = 64];

  bool bool_value = 26 [(redact.value).bool = true];

  string string_value = 28 [(redact.value).string = "redacted-value-value"];

  bytes bytes_value = 30 [(redact.value).bytes = "redacted-value-value"];

  TestEnum enum_value = 32 [(redact.value).enum = 2];

  TestMessage message_nil = 34 [(redact.value).message.nil = true];
  TestMessage message_skip = 35 [(redact.value).message.skip = true];
  TestMessage message_empty = 36 [(redact.value).message.empty = true];

  map<int64, string> map1_empty = 39 [(redact.value).element.empty = true];
  map<string, google.protobuf.Empty> map2_empty = 40 [(redact.value).element.empty = true];

  map<int64, string> map1_nested = 41 [(redact.value).element.nested = true];
  map<string, google.protobuf.Empty> map2_nested = 42 [(redact.value).element.nested = true];

  map<int64, string> map1_item = 43 [(redact.value).element.item.string = "3"];
  map<string, google.protobuf.Empty> map2_item_nil = 44 [(redact.value).element.item.message.nil = true];
  map<string, google.protobuf.Empty> map2_item_skip = 45 [(redact.value).element.item.message.skip = true];
  map<string, google.protobuf.Empty> map2_item_empty = 46 [(redact.value).element.item.message.empty = true];

  // Regex-based masking
  string phone_regex = 47 [(redact.value).regex = { pattern: "^(\\d{3})\\d{4}(\\d{4})$" replacement: "${1}****${2}" }];
  optional string email_regex = 48 [(redact.value).regex = { pattern: "(^.).*(@.+$)" replacement: "${1}***${2}" }];
  repeated string tags_regex = 49 [(redact.value).element.item.regex = { pattern: "\\d" replacement: "*" }];

  // Mask-based redaction
  string mask_phone = 50 [(redact.value).mask = { keep_first: 3 keep_last: 4 }];
  optional string mask_id_card = 51 [(redact.value).mask = { keep_first: 6 keep_last: 4 mask_char: "X" }];
  repeated string mask_emails = 52 [(redact.value).element.item.mask = { keep_first: 2 keep_last: 0 }];

  // Email-based redaction
  string email_addr = 53 [(redact.value).email = { keep_local_first: 2 }];
  optional string email_addr2 = 54 [(redact.value).email = { keep_local_first: 1 mask_domain: true }];

  // Truncate-based redaction
  string truncate_name = 55 [(redact.value).truncate = { length: 1 suffix: "**" }];

  // Hash-based redaction
  string hash_token = 56 [(redact.value).hash = { algo: SHA256 }];
  repeated string hash_tokens = 57 [(redact.value).element.item.hash = { algo: MD5 }];

  // UUID-based redaction
  string uuid_user_id = 58 [(redact.value).uuid = {}];
  repeated string uuid_tokens = 59 [(redact.value).element.item.uuid = {}];

  // IP-based redaction
  string ip_address = 60 [(redact.value).ip = { keep_octets: 2 }];
  optional string ip_address2 = 61 [(redact.value).ip = { keep_octets: 3 mask_char: "0" }];

  // URL-based redaction
  string callback_url = 62 [(redact.value).url = { mask_query: true }];

  // FixedLength-based redaction
  string bank_account = 63 [(redact.value).fixed_length = { char: "X" }];

  // Custom-based redaction
  string custom_ssn = 64 [(redact.value).custom = { name: "myRedactor" }];

  // Condition-based redaction (wrapping mask)
  string cond_phone = 65 [(redact.value).condition = { env_var: "APP_ENV" env_val: "production" rules: { mask: { keep_first: 3 keep_last: 4 } } }];

  // AutoDetect fields (no explicit rule, caught by file-level auto_detect)
  string user_password = 66;
  string user_secret = 67;
}

// OneofMessage demonstrates oneof field handling
message OneofMessage {
  string id = 1;

  // Oneof with all fields redacted
  oneof contact {
    string email = 2 [(redact.value).string = "r*d@ct*d"];
    string phone = 3 [(redact.value).string = "XXX-XXX-XXXX"];
    int32 phone_code = 4 [(redact.value).int32 = 0];
  }

  // Oneof with a message field
  oneof payload {
    TestMessage nested_msg = 5 [(redact.value).message.apply = true];
    TestMessage nil_msg = 6 [(redact.value).message.nil = true];
    string raw_data = 7 [(redact.value).string = "REDACTED"];
  }

  // Oneof with mixed redacted and non-redacted fields
  oneof identifier {
    string username = 8 [(redact.value).string = "REDACTED"];
    string public_id = 9;
    int64 internal_id = 10 [(redact.value).int64 = 0];
  }

  // Oneof with regex masking
  oneof credential {
    string api_key = 11 [(redact.value).regex = { pattern: "(.{4}).*(.{4})" replacement: "${1}****${2}" }];
  }

  // Oneof with mask/email/truncate/hash
  oneof pii {
    string ssn_mask = 12 [(redact.value).mask = { keep_first: 0 keep_last: 4 }];
    string email_mask = 13 [(redact.value).email = { keep_local_first: 1 }];
    string name_trunc = 14 [(redact.value).truncate = { length: 2 }];
    string secret_hash = 15 [(redact.value).hash = { algo: SHA1 }];
    string uuid_pii = 16 [(redact.value).uuid = {}];
    string ip_pii = 17 [(redact.value).ip = { keep_octets: 1 }];
    string url_pii = 18 [(redact.value).url = { mask_query: true }];
    string fixed_pii = 19 [(redact.value).fixed_length = { char: "#" }];
    string custom_pii = 20 [(redact.value).custom = { name: "myRedactor" }];
    string cond_pii = 21 [(redact.value).condition = { env_var: "DEBUG" env_val: "" rules: { mask: { keep_first: 1 keep_last: 1 } } }];
  }
}

